# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# general settings
#set -g default-terminal "screen-256color" # colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
setw -g xterm-keys on
set -s escape-time 10                     # faster command sequences
set -sg repeat-time 250                   # repeat timeout
set -s focus-events on

# split panes using | and - 
bind | split-window -h 
bind - split-window -v 
unbind '"' 
unbind %
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Enable mouse control (clickable windows, panes, resizable panes)
set-option -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# Copy to clipboard
set-option -s set-clipboard on
setw -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
#bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -se c -i"

# Status bar colors
set -g status-bg '#1e3a8a'          # Dark blue background
set -g status-fg '#e2e8f0'          # Light gray text

# Active window styling
set -g window-status-current-style 'bg=#3b82f6,fg=#ffffff,bold'

# Inactive window styling  
set -g window-status-style 'bg=#1e3a8a,fg=#94a3b8'

# Pane border colors
set -g pane-border-style 'fg=#475569'
set -g pane-active-border-style 'fg=#3b82f6'

